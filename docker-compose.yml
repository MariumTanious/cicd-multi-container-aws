version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017/tasksdb
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    environment:
      MONGO_INITDB_DATABASE: tasksdb
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
